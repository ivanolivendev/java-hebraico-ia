spring.application.name=IaHebraica

# --- CONFIGURAÇÃO DO QDRANT (BANCO VETORIAL) ---
# O host 'qdrant' refere-se ao nome do serviço no docker-compose.yml
spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=meu_livro_ollama
spring.ai.vectorstore.qdrant.use-tls=false

# CORREÇÃO: O Spring AI M5 mapeia o texto para a chave 'content' no payload do Qdrant
spring.ai.vectorstore.qdrant.content-field-name=content

# --- CONFIGURAÇÃO DO OLLAMA (MODELOS DE IA) ---
# host.docker.internal permite que o container acesse o Ollama rodando no Windows
spring.ai.ollama.base-url=http://host.docker.internal:11434
spring.ai.ollama.chat.model=llama3
spring.ai.ollama.embedding.model=nomic-embed-text

# --- AJUSTES DE PERFORMANCE ---
# Aumenta o tempo de espera para a IA gerar respostas longas
spring.mvc.async.request-timeout=60000