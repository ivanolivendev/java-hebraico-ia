version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    # Se você tiver GPU NVIDIA, descomente as linhas abaixo:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  ia-hebraica:
    image: maven:3.9.6-eclipse-temurin-21
    container_name: ia-hebraica
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./IaHebraica:/app
      - ~/.m2:/root/.m2
    depends_on:
      - qdrant
      - ollama
    environment:
      - SPRING_AI_VECTORSTORE_QDRANT_HOST=qdrant
      - SPRING_AI_VECTORSTORE_QDRANT_PORT=6334
      - SPRING_AI_OLLAMA_BASE_URL=http://ollama:11434
      - SPRING_AI_OLLAMA_CHAT_MODEL=llama3
      - SPRING_AI_OLLAMA_EMBEDDING_MODEL=nomic-embed-text
    command: mvn spring-boot:run -Dspring-boot.run.jvmArguments="-Dspring.devtools.restart.enabled=true"